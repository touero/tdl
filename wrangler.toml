name = "downloads-weiensong-top"
main = "worker/index.ts"
compatibility_date = "2026-03-11"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[vars]
DOWNLOAD_PREFIX = "downloads/"

[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "downloads-weiensong-top"
preview_bucket_name = "downloads-weiensong-top-preview"

[[routes]]
pattern = "downloads.weiensong.top"
custom_domain = true
